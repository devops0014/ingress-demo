# ============================================================
# REVIEWS SERVICE
# REST API for customer reviews — routed at path: /api/reviews
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviews-service
  namespace: bookstore
  labels:
    app: bookstore
    tier: reviews-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookstore
      tier: reviews-service
  template:
    metadata:
      labels:
        app: bookstore
        tier: reviews-service
    spec:
      containers:
        - name: reviews-service
          image: bookstore-reviews-service:latest   # Replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---

apiVersion: v1
kind: Service
metadata:
  name: reviews-svc
  namespace: bookstore
  labels:
    app: bookstore
    tier: reviews-service
spec:
  type: ClusterIP
  selector:
    app: bookstore
    tier: reviews-service
  ports:
    - name: http
      port: 80
      targetPort: 3002
