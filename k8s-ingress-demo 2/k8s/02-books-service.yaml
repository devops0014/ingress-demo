# ============================================================
# BOOKS SERVICE
# REST API for book catalog — routed at path: /api/books
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-service
  namespace: bookstore
  labels:
    app: bookstore
    tier: books-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookstore
      tier: books-service
  template:
    metadata:
      labels:
        app: bookstore
        tier: books-service
    spec:
      containers:
        - name: books-service
          image: bookstore-books-service:latest   # Replace with your registry image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---

apiVersion: v1
kind: Service
metadata:
  name: books-svc
  namespace: bookstore
  labels:
    app: bookstore
    tier: books-service
spec:
  type: ClusterIP
  selector:
    app: bookstore
    tier: books-service
  ports:
    - name: http
      port: 80
      targetPort: 3001
